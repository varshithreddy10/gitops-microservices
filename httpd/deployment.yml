apiVersion: apps/v1
kind: Deployment

metadata:
  name: httpd-deployment
  namespace: test

spec:
  replicas: 2

  selector:
    matchLabels:
      app: httpd

  template:
    metadata:
      labels:
        app: httpd

    spec:
      containers:
      - name: httpd
        image: httpd:latest

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "200m"
            memory: "256Mi"
